<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fam Music League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- GoatCounter analytics -->
<script data-goatcounter="https://fml.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
:root {
  /* These are overwritten per-round by inline style on <body> */
  --p:    #F08A47;  /* primary    */
  --a:    #F4B97A;  /* accent     */
  --c:    #4FA0C4;  /* cool       */
  --h:    #C25A28;  /* highlight  */
  --tile: #1f1814;  /* body tile color */
  --bg:    #0A0A0A;
  --main:  #111;
  --card:  #1A1A1A;
  --surf:  #222;
  --line:  #2a2a2a;
  --text:  #fafafa;
  --mute:  #888;
  --dim:   #666;
  --faint: #444;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  background-image: var(--body-tile, none);
  background-repeat: repeat;
  background-position: top left;
}

a { color: inherit; text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }

#root {
  max-width: 880px;
  margin: 0 auto;
  background: var(--main);
  min-height: 100vh;
  position: relative;
}

/* ---------- Header ---------- */
.header {
  background: var(--bg);
  padding: 18px 24px 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.brand-name {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--text);
}
.brand-sub {
  font-size: 12px;
  color: var(--mute);
  margin-top: 2px;
}

/* ---------- Theme band (per-week component renders inside this container) ---------- */
.themeband {
  height: 22px;
  position: relative;
  background: var(--bg);
  overflow: hidden;
}
.themeband.themeband-cassette {
  height: 52px;
}
.themeband.themeband-passport {
  height: 44px;
}

/* Horizon band (Week 1 / summer) */
.band-horizon {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.band-sun {
  width: 18px;
  height: 18px;
  position: absolute;
  right: 14%;
  top: 2px;
}

/* Cassette band (Week 2) — the band IS the cassette, full width */
.band-cassette-full {
  width: 100%;
  height: 100%;
  position: relative;
  display: block;
}

/* Passport band (Week 3) — aged cream paper with hand-stamped impressions */
.band-passport {
  width: 100%;
  height: 100%;
  position: relative;
  display: block;
  background: var(--a);
  box-shadow: inset 0 1px 0 rgba(0,0,0,0.18), inset 0 -1px 0 rgba(0,0,0,0.18);
  overflow: hidden;
}
.band-passport svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* ---------- Nav ---------- */
.nav {
  background: var(--main);
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 0 12px;
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
}
.nav::-webkit-scrollbar { display: none; }
.nav-item {
  position: relative;
  padding: 13px 14px;
  font-size: 13px;
  letter-spacing: 0.01em;
  color: var(--mute);
  background: transparent;
  border: none;
  white-space: nowrap;
  transition: color 0.18s ease;
}
.nav-item::after {
  content: '';
  position: absolute;
  left: 14px;
  right: 14px;
  bottom: 0;
  height: 2px;
  border-radius: 1px;
  background: var(--p);
  opacity: 0;
  transform: scaleX(0.4);
  transform-origin: center;
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.nav-item:hover { color: color-mix(in srgb, var(--a) 60%, var(--text) 40%); }
.nav-item:hover::after { opacity: 0.35; transform: scaleX(0.7); }
.nav-item.active {
  color: var(--text);
}
.nav-item.active::after { opacity: 1; transform: scaleX(1); }
@media (min-width: 720px) {
  .nav { gap: 8px; padding: 0 24px; }
  .nav-item { padding: 14px 18px; font-size: 14px; }
  .nav-item::after { left: 18px; right: 18px; }
}

/* Spool-pair tab underline (cassette theme) — overrides the default solid bar.
   Two small dots flanking a connecting line, mimicking cassette reels with tape. */
body.tab-spool .nav-item::after {
  background: transparent;
  height: 4px;
  border-radius: 0;
  bottom: 1px;
  /* The center "tape" line */
  background-image:
    radial-gradient(circle at 6px 50%, var(--p) 1.6px, transparent 2px),
    radial-gradient(circle at calc(100% - 6px) 50%, var(--p) 1.6px, transparent 2px),
    linear-gradient(90deg, var(--p), var(--p));
  background-size: 100% 100%, 100% 100%, calc(100% - 12px) 1px;
  background-position: 0 0, 0 0, 6px 50%;
  background-repeat: no-repeat;
}
body.tab-spool .nav-item:hover::after {
  /* On hover, just the tape — no spools yet */
  background-image: linear-gradient(90deg, var(--p), var(--p));
  background-size: calc(100% - 12px) 1px;
  background-position: 6px 50%;
}

/* Stamp tab underline (passport theme) — a solid oxblood stripe with a faint
   ink-bleed echo one pixel below, mimicking a pressed-and-lifted ink mark. */
body.tab-stamp .nav-item::after {
  background: var(--p);
  height: 2px;
  border-radius: 0;
  bottom: 0;
  box-shadow: 0 2px 0 0 color-mix(in srgb, var(--p) 40%, transparent);
}
body.tab-stamp .nav-item:hover::after {
  box-shadow: 0 2px 0 0 color-mix(in srgb, var(--p) 22%, transparent);
}

/* ---------- Page container ---------- */
.page { padding: 22px 24px 80px 24px; }

/* ---------- Round bar ---------- */
.roundbar {
  background: var(--main);
  padding: 16px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
}
.roundbar-arrow {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--mute);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, color 0.15s, border-color 0.15s;
}
.roundbar-arrow:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--p);
  transform: translateY(-1px) scale(1.05);
}
.roundbar-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.roundbar-content {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.roundbar-tile {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
}
.roundbar-text { min-width: 0; flex: 1; }
.roundbar-label {
  color: var(--dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.roundbar-name {
  color: var(--text);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.roundbar-desc {
  color: var(--mute);
  font-size: 12px;
  margin-top: 3px;
  font-style: italic;
}

/* ---------- Section heading ---------- */
.section-h {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 24px 0 12px 0;
}
.section-h:first-child { margin-top: 0; }
.section-h-title {
  color: var(--text);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.section-h-meta { color: var(--dim); font-size: 11px; }

/* ---------- Cards ---------- */
.card {
  background: var(--card);
  border-radius: 10px;
  padding: 14px 16px;
}
.card-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ---------- Winner card ---------- */
.winner-card {
  background: var(--card);
  border-radius: 10px;
  border-left: 3px solid var(--p);
  padding: 16px 18px;
  display: flex;
  gap: 14px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.winner-art {
  width: 64px;
  height: 64px;
  border-radius: 6px;
  background: var(--surf);
  flex-shrink: 0;
  overflow: hidden;
}
.winner-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.winner-info { flex: 1; min-width: 0; }
.winner-rank {
  color: var(--mute);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.winner-title {
  color: var(--text);
  font-size: 16px;
  font-weight: 500;
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.winner-meta {
  color: var(--mute);
  font-size: 12px;
  margin-top: 2px;
}
.winner-meta .dot { color: var(--dim); margin: 0 6px; }
.winner-pts {
  text-align: right;
  flex-shrink: 0;
}
.winner-pts-num {
  color: var(--p);
  font-size: 26px;
  font-weight: 500;
  line-height: 1;
}
.winner-pts-label {
  color: var(--dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* Confetti animation for winner card on first paint */
@keyframes confetti-fall {
  0%   { transform: translateY(-12px) rotate(0deg); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateY(140px) rotate(720deg); opacity: 0; }
}
.confetti-piece {
  position: absolute;
  width: 6px;
  height: 10px;
  border-radius: 1px;
  animation: confetti-fall 1.6s ease-out forwards;
}

/* ---------- Stat cards ---------- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 22px;
}
@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
.stat-box {
  background: var(--card);
  border-radius: 8px;
  padding: 12px 14px;
}
.stat-box.cool { border-top: 2px solid var(--c); }
/* Dashed border variant for cassette theme (tape-segment texture) */
body.accent-dashed .stat-box.cool {
  border-top: 2px dashed var(--c);
}
/* Dotted border variant for passport theme (postage perforation reference) */
body.accent-dotted .stat-box.cool {
  border-top: 2px dotted var(--c);
}
.stat-label {
  color: var(--dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.stat-num {
  color: var(--text);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.1;
  margin-top: 4px;
}
.stat-num.cool { color: var(--c); }

/* ---------- Leaderboard rows ---------- */
.lb { background: var(--card); border-radius: 10px; overflow: hidden; }
.lb-row {
  display: flex;
  align-items: center;
  padding: 11px 14px;
  border-bottom: 1px solid var(--surf);
  transition: background 0.15s;
}
.lb-row:last-child { border-bottom: none; }
.lb-row.first {
  background: linear-gradient(90deg, color-mix(in srgb, var(--p) 12%, transparent) 0%, transparent 60%);
}
.lb-row.first .lb-rank, .lb-row.first .lb-pts { color: var(--p); }
.lb-row:hover { background: rgba(255,255,255,0.02); }
.lb-row.first:hover {
  background: linear-gradient(90deg, color-mix(in srgb, var(--p) 16%, transparent) 0%, rgba(255,255,255,0.02) 60%);
}
.lb-rank {
  width: 28px;
  color: var(--mute);
  font-size: 13px;
  font-weight: 500;
}
.lb-name {
  flex: 1;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
}
.lb-name:hover { color: var(--p); text-decoration: underline; }
.lb-pts {
  color: var(--text);
  font-size: 16px;
  font-weight: 500;
  min-width: 36px;
  text-align: right;
  margin-left: 14px;
  flex-shrink: 0;
}
.lb-forfeit {
  color: var(--dim);
  font-size: 11px;
  font-style: italic;
  flex-shrink: 0;
  text-align: right;
}

/* ---------- Song cards (expandable) ---------- */
.song-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
.song-card {
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}
.song-card:hover { border-color: var(--surf); }
.song-card.open { border-color: var(--p); }
.song-card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
}
.song-rank {
  width: 24px;
  color: var(--mute);
  font-size: 12px;
  font-weight: 500;
  flex-shrink: 0;
  text-align: center;
}
.song-art {
  width: 40px;
  height: 40px;
  border-radius: 5px;
  background: var(--surf);
  flex-shrink: 0;
  overflow: hidden;
}
.song-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.song-meta { flex: 1; min-width: 0; }
.song-title {
  color: var(--text);
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.song-sub {
  color: var(--mute);
  font-size: 12px;
  margin-top: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.song-pts {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-shrink: 0;
}
.song-pts-num {
  color: var(--text);
  font-size: 16px;
  font-weight: 500;
}
.song-pts-vot {
  color: var(--dim);
  font-size: 11px;
}
.song-chevron {
  color: var(--dim);
  font-size: 14px;
  flex-shrink: 0;
  transition: transform 0.2s;
  width: 16px;
  text-align: center;
}
.song-card.open .song-chevron { transform: rotate(90deg); color: var(--p); }
.song-body {
  padding: 0 14px 14px 14px;
  border-top: 1px solid var(--surf);
  margin-top: -1px;
  background: rgba(0,0,0,0.15);
}
.song-comment {
  font-style: italic;
  color: var(--mute);
  font-size: 12px;
  padding: 12px 4px;
  border-bottom: 1px solid var(--surf);
  margin-bottom: 8px;
}
.song-comment-label {
  color: var(--dim);
  font-style: normal;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.1em;
  margin-right: 8px;
}
.vote-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-top: 10px;
}
.vote-list-empty {
  color: var(--dim);
  font-size: 12px;
  font-style: italic;
  padding: 12px 4px;
  text-align: center;
}
.vote-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 4px;
  font-size: 12px;
  border-bottom: 1px dashed var(--surf);
}
.vote-row:last-child { border-bottom: none; }
.vote-pts {
  background: var(--surf);
  color: var(--text);
  border-radius: 4px;
  padding: 2px 8px;
  font-weight: 500;
  min-width: 24px;
  text-align: center;
  font-size: 11px;
}
.vote-pts.high { background: var(--p); color: #fff; }
.vote-pts.mid  { background: var(--a); color: #1a0f08; }
.vote-name {
  color: var(--text);
  cursor: pointer;
  flex-shrink: 0;
  font-weight: 500;
}
.vote-name:hover { color: var(--p); text-decoration: underline; }
.vote-comment {
  color: var(--mute);
  font-style: italic;
  flex: 1;
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Zero-point vote row — voter left a comment but did NOT give points.
   Renders without a points pill: just a "no vote" label and the comment. */
.vote-row.zero {
  opacity: 0.78;
}
.vote-pts.zero {
  background: transparent;
  color: var(--dim);
  border: 1px dashed var(--surf);
  font-size: 10px;
  letter-spacing: 0.04em;
  font-weight: 400;
  padding: 1px 6px;
}

/* Forfeited submission — submitter did not vote this round, so their song's points
   are zeroed out. Render with strikethrough on the points + visually demoted. */
.song-card.forfeited .song-pts-num {
  text-decoration: line-through;
  text-decoration-thickness: 1.5px;
  color: var(--dim);
}
.song-card.forfeited .song-pts-vot {
  text-decoration: line-through;
  color: var(--dim);
}
.song-card.forfeited .song-meta { opacity: 0.7; }
.song-card.forfeited .song-art  { opacity: 0.7; }
.song-card.forfeited::before {
  /* Subtle "FORFEIT" tag in the top-right corner of the card head */
  content: 'forfeit';
  position: absolute;
  top: 6px;
  right: 36px;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  pointer-events: none;
}
.song-card.forfeited { position: relative; }
.forfeit-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 14px 0 4px 0;
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.forfeit-divider::before, .forfeit-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--surf);
}

.expand-toggle {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--mute);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  margin-bottom: 10px;
  transition: color 0.15s, border-color 0.15s;
}
.expand-toggle:hover { color: var(--text); border-color: var(--p); }

/* ---------- Generosity / missed lists ---------- */
.flat-list { background: var(--card); border-radius: 10px; padding: 4px 0; }
.flat-list-row {
  display: flex;
  align-items: center;
  padding: 9px 14px;
  border-bottom: 1px solid var(--surf);
  font-size: 13px;
}
.flat-list-row:last-child { border-bottom: none; }
.flat-list-name { flex: 1; color: var(--text); }
.flat-list-val { color: var(--mute); font-size: 12px; }
.flat-list-pts { color: var(--text); font-weight: 500; min-width: 36px; text-align: right; font-size: 13px; }

/* ---------- Player profile + grids ---------- */
.player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.player-cell {
  background: var(--card);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  border: 1px solid transparent;
}
.player-cell:hover { border-color: var(--p); transform: translateY(-1px); }
.player-cell-name { color: var(--text); font-size: 14px; font-weight: 500; }
.player-cell-stat { color: var(--mute); font-size: 11px; margin-top: 2px; }

.profile-head {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 22px;
}
.profile-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--p);
  color: #1a0f08;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 500;
  flex-shrink: 0;
}
.profile-name { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.profile-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 22px;
}

/* ---------- Fun metrics ---------- */
.fm-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (max-width: 600px) { .fm-grid { grid-template-columns: 1fr; } }
.fm-card {
  background: var(--card);
  border-radius: 10px;
  padding: 14px 16px;
}
.fm-card.full { grid-column: 1 / -1; }
.fm-title {
  color: var(--a);
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.fm-desc { color: var(--dim); font-size: 11px; margin-top: 2px; }
.fm-leader { color: var(--text); font-size: 15px; margin-top: 8px; font-weight: 500; }
.fm-detail { color: var(--mute); font-size: 12px; margin-top: 2px; }
.fm-empty { color: var(--dim); font-size: 12px; margin-top: 8px; font-style: italic; }
.fm-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.fm-list-row { display: flex; justify-content: space-between; font-size: 12px; }
.fm-list-name { color: var(--text); }
.fm-list-val  { color: var(--mute); }

/* ---------- Recap (commentary on its own page) ---------- */
.recap {
  max-width: 660px;
  margin: 0 auto;
}
.recap-section { margin-bottom: 28px; }
.recap-h {
  color: var(--a);
  font-size: 14px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.recap-p {
  color: var(--text);
  font-size: 15px;
  line-height: 1.65;
  margin: 0;
}

/* ---------- Empty states ---------- */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--mute);
  font-size: 14px;
  font-style: italic;
}

/* ---------- Chart container ---------- */
.chart-wrap {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  height: 260px;
  position: relative;
}

/* ---------- Loading note bouncer ---------- */
@keyframes note-bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
.note-loader {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--p);
  animation: note-bounce 0.8s ease-in-out infinite;
}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ---------------------------------------------------------------------------
// Utility helpers
// ---------------------------------------------------------------------------

const trimTitle = (t) => {
  if (!t) return '';
  const idx = t.indexOf(' - ');
  return idx >= 0 ? t.substring(0, idx) : t;
};

const initials = (name) => {
  if (!name) return '?';
  const parts = name.split(/\s+/);
  if (parts.length === 1) return parts[0][0]?.toUpperCase() || '?';
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
};

const applyTheme = (theme) => {
  const body = document.body;
  // Reset all theme/tab/accent classes
  body.classList.forEach(c => {
    if (c.startsWith('theme-') || c.startsWith('tab-') || c.startsWith('accent-')) {
      body.classList.remove(c);
    }
  });
  if (!theme || !theme.palette) return;
  const p = theme.palette;
  body.style.setProperty('--p', p.primary || '#F08A47');
  body.style.setProperty('--a', p.accent || '#F4B97A');
  body.style.setProperty('--c', p.cool || '#4FA0C4');
  body.style.setProperty('--h', p.highlight || '#C25A28');
  body.style.setProperty('--tile', p.tile || '#1f1814');
  if (theme.band_gradient) {
    body.style.setProperty('--band-gradient', theme.band_gradient);
  }
  if (theme.tile_class) {
    body.classList.add(theme.tile_class);
  }
  // Apply design-pack body classes so CSS can swap underline / accent treatments per theme
  const design = theme.design || {};
  if (design.tab_underline) body.classList.add(`tab-${design.tab_underline}`);
  if (design.stat_accent)   body.classList.add(`accent-${design.stat_accent}`);
};

// ---------------------------------------------------------------------------
// Theme bands — one component per theme, rendered inside the .themeband container
// ---------------------------------------------------------------------------

function HorizonBand({ palette }) {
  // Sun rising over a soft horizon — Week 1 / summer
  const cool      = palette?.cool      || '#4FA0C4';
  const accent    = palette?.accent    || '#F4B97A';
  const primary   = palette?.primary   || '#F08A47';
  const highlight = palette?.highlight || '#C25A28';
  const grad = `linear-gradient(90deg, ${cool} 0%, ${accent} 45%, ${primary} 75%, ${highlight} 100%)`;
  return (
    <div className="band-horizon" style={{ background: grad }}>
      <svg className="band-sun" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="6" fill="#fff" opacity="0.85" />
      </svg>
    </div>
  );
}

function CassetteBand({ palette }) {
  const primary   = palette?.primary   || '#C9824B';
  const accent    = palette?.accent    || '#D9B68C';
  const cool      = palette?.cool      || '#5B7B8C';
  const highlight = palette?.highlight || '#8B4513';

  // Reel animation refs — driven imperatively via requestAnimationFrame
  // so we don't trigger a React re-render at 60fps.
  const leftReelRef  = useRef(null);
  const rightReelRef = useRef(null);
  const tapeStrandRef = useRef(null);
  const rafRef = useRef(null);
  const playStateRef = useRef({
    playing: false,
    leftAngle: 0,
    rightAngle: 0,
    tapeOffset: 0,
    lastTs: 0,
  });

  useEffect(() => {
    // Listen for play/pause events from PlayMark
    const onToggle = (e) => {
      const playing = !!(e.detail && e.detail.playing);
      const s = playStateRef.current;
      s.playing = playing;
      if (playing) {
        s.lastTs = performance.now();
        startLoop();
      }
      // When paused, the loop will detect !playing and stop itself
    };

    const startLoop = () => {
      if (rafRef.current) return;
      const tick = (ts) => {
        const s = playStateRef.current;
        const dt = Math.min(50, ts - s.lastTs);  // clamp dt to avoid jumps if tab was hidden
        s.lastTs = ts;

        if (s.playing) {
          // Real cassette: smaller reel spins faster (constant tape speed).
          // Left = bigger (more wound), right = smaller. Right spins faster.
          // Rotation in deg/sec — picked for "obviously moving but not frantic" feel.
          const leftDegPerSec  = 180;   // 0.5 rotations/sec
          const rightDegPerSec = 215;   // 1.18x faster, matches reel-radius ratio
          s.leftAngle  = (s.leftAngle  + leftDegPerSec  * dt / 1000) % 360;
          s.rightAngle = (s.rightAngle + rightDegPerSec * dt / 1000) % 360;
          s.tapeOffset = (s.tapeOffset + 60 * dt / 1000) % 12; // pixel scroll for tape strand

          if (leftReelRef.current) {
            leftReelRef.current.setAttribute('transform', `rotate(${s.leftAngle} 23 23)`);
          }
          if (rightReelRef.current) {
            rightReelRef.current.setAttribute('transform', `rotate(${s.rightAngle} 21 21)`);
          }
          if (tapeStrandRef.current) {
            tapeStrandRef.current.setAttribute('stroke-dashoffset', String(-s.tapeOffset));
          }
          rafRef.current = requestAnimationFrame(tick);
        } else {
          // Stopped — clear the loop, leave reels at their last angle (visually parked)
          rafRef.current = null;
        }
      };
      rafRef.current = requestAnimationFrame(tick);
    };

    window.addEventListener('cassette-play-toggle', onToggle);
    return () => {
      window.removeEventListener('cassette-play-toggle', onToggle);
      if (rafRef.current) {
        cancelAnimationFrame(rafRef.current);
        rafRef.current = null;
      }
      playStateRef.current.playing = false;
    };
  }, []);

  return (
    <div className="band-cassette-full">
      {/* === LAYER 1: Stretched body (rectangles only) === */}
      <svg
        viewBox="0 0 600 52"
        preserveAspectRatio="none"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', display: 'block' }}
        aria-hidden="true"
      >
        {/* Cassette body shell */}
        <rect x="0" y="0" width="600" height="52" fill={highlight} />
        {/* Top edge highlight */}
        <rect x="0" y="0" width="600" height="1.5" fill={primary} opacity="0.5" />
        {/* Label area */}
        <rect x="0" y="3" width="600" height="14" fill={accent} />
        {/* Label edge shadow */}
        <line x1="0" y1="17" x2="600" y2="17" stroke={highlight} strokeWidth="0.5" opacity="0.4" />
        {/* Central window cutout - dark interior */}
        <rect x="0" y="18" width="600" height="26" fill="#0d0a08" />
        {/* Tape strand running across the bottom of the window — gets dash-offset animated when playing */}
        <line
          ref={tapeStrandRef}
          x1="0" y1="40" x2="600" y2="40"
          stroke={cool} strokeWidth="1.2" opacity="0.85"
          strokeDasharray="6 6"
        />
        {/* Lower bezel */}
        <rect x="0" y="44" width="600" height="8" fill={highlight} />
        <line x1="0" y1="45" x2="600" y2="45" stroke={primary} strokeWidth="0.4" opacity="0.4" />
        <rect x="0" y="51" width="600" height="1" fill={primary} opacity="0.4" />
      </svg>

      {/* === LAYER 2: Mechanism - reels and details that don't stretch === */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, pointerEvents: 'none' }}>

        {/* Hand-written label texture - dashes suggesting writing */}
        <div style={{
          position: 'absolute',
          left: '60px',
          top: '8px',
          right: '60px',
          height: '0.7px',
          backgroundImage: `repeating-linear-gradient(90deg, ${highlight} 0px, ${highlight} 28px, transparent 28px, transparent 38px, ${highlight} 38px, ${highlight} 70px, transparent 70px, transparent 90px, ${highlight} 90px, ${highlight} 130px, transparent 130px, transparent 145px)`,
          opacity: 0.4,
        }} />

        {/* SIDE A indicator on label */}
        <div style={{
          position: 'absolute',
          left: '14px',
          top: '6px',
          fontSize: '8px',
          color: highlight,
          opacity: 0.65,
          fontFamily: 'Georgia, serif',
          fontStyle: 'italic',
          fontWeight: 500,
          letterSpacing: '0.1em',
        }}>SIDE A</div>

        {/* Left reel - fully wound; rotates as one unit when playing */}
        <svg
          width="46" height="46"
          viewBox="0 0 46 46"
          style={{ position: 'absolute', top: '50%', left: '33%', transform: 'translate(-50%, -50%)', display: 'block' }}
          aria-hidden="true"
        >
          <g ref={leftReelRef}>
            {/* Outer wound-tape disc */}
            <circle cx="23" cy="23" r="20" fill={cool} opacity="0.5" />
            {/* Tape winding rings */}
            <circle cx="23" cy="23" r="18" fill="none" stroke={cool} strokeWidth="0.5" opacity="0.6" />
            <circle cx="23" cy="23" r="15.5" fill="none" stroke={cool} strokeWidth="0.5" opacity="0.5" />
            <circle cx="23" cy="23" r="13" fill="none" stroke={cool} strokeWidth="0.5" opacity="0.4" />
            {/* Reel disc */}
            <circle cx="23" cy="23" r="11" fill={primary} stroke={accent} strokeWidth="0.6" />
            {/* Hub */}
            <circle cx="23" cy="23" r="5" fill={highlight} />
            {/* Six prong holes around the hub */}
            <g fill={accent}>
              <circle cx="23"   cy="19.4" r="1.0" />
              <circle cx="26.1" cy="21.2" r="1.0" />
              <circle cx="26.1" cy="24.8" r="1.0" />
              <circle cx="23"   cy="26.6" r="1.0" />
              <circle cx="19.9" cy="24.8" r="1.0" />
              <circle cx="19.9" cy="21.2" r="1.0" />
            </g>
            {/* Center pin */}
            <circle cx="23" cy="23" r="1.4" fill={highlight} />
            {/* Spoke marks - help the rotation read at a glance */}
            <g stroke={accent} strokeWidth="0.6" strokeLinecap="round" opacity="0.7">
              <line x1="23" y1="14.5" x2="23" y2="16.5" />
              <line x1="23" y1="29.5" x2="23" y2="31.5" />
              <line x1="14.5" y1="23" x2="16.5" y2="23" />
              <line x1="29.5" y1="23" x2="31.5" y2="23" />
            </g>
          </g>
        </svg>

        {/* Right reel - less wound (asymmetric, like mid-play); spins ~1.18x faster */}
        <svg
          width="42" height="42"
          viewBox="0 0 42 42"
          style={{ position: 'absolute', top: '50%', right: '33%', transform: 'translate(50%, -50%)', display: 'block' }}
          aria-hidden="true"
        >
          <g ref={rightReelRef}>
            {/* Outer wound-tape disc - smaller */}
            <circle cx="21" cy="21" r="17" fill={cool} opacity="0.5" />
            <circle cx="21" cy="21" r="15" fill="none" stroke={cool} strokeWidth="0.5" opacity="0.6" />
            <circle cx="21" cy="21" r="12.5" fill="none" stroke={cool} strokeWidth="0.5" opacity="0.4" />
            {/* Reel disc - slightly smaller because less wound */}
            <circle cx="21" cy="21" r="10" fill={primary} stroke={accent} strokeWidth="0.6" />
            {/* Hub */}
            <circle cx="21" cy="21" r="5" fill={highlight} />
            <g fill={accent}>
              <circle cx="21"   cy="17.4" r="1.0" />
              <circle cx="24.1" cy="19.2" r="1.0" />
              <circle cx="24.1" cy="22.8" r="1.0" />
              <circle cx="21"   cy="24.6" r="1.0" />
              <circle cx="17.9" cy="22.8" r="1.0" />
              <circle cx="17.9" cy="19.2" r="1.0" />
            </g>
            <circle cx="21" cy="21" r="1.4" fill={highlight} />
            <g stroke={accent} strokeWidth="0.6" strokeLinecap="round" opacity="0.7">
              <line x1="21" y1="13" x2="21" y2="15" />
              <line x1="21" y1="27" x2="21" y2="29" />
              <line x1="13" y1="21" x2="15" y2="21" />
              <line x1="27" y1="21" x2="29" y2="21" />
            </g>
          </g>
        </svg>

        {/* Tape head between reels (small fixed-position mechanism) */}
        <svg
          width="14" height="10"
          viewBox="0 0 14 10"
          style={{ position: 'absolute', top: '76%', left: '50%', transform: 'translate(-50%, -50%)', display: 'block' }}
          aria-hidden="true"
        >
          <rect x="2" y="2" width="10" height="6" fill={highlight} stroke={primary} strokeWidth="0.4" rx="0.5" />
          <line x1="0" y1="5" x2="14" y2="5" stroke={cool} strokeWidth="1.2" opacity="0.95" />
        </svg>

        {/* Screw holes at bottom corners */}
        <div style={{
          position: 'absolute',
          left: '14px',
          bottom: '3px',
          width: '3px',
          height: '3px',
          borderRadius: '50%',
          background: accent,
          opacity: 0.45,
          boxShadow: `inset 0 0 0 0.5px ${highlight}`,
        }} />
        <div style={{
          position: 'absolute',
          right: '14px',
          bottom: '3px',
          width: '3px',
          height: '3px',
          borderRadius: '50%',
          background: accent,
          opacity: 0.45,
          boxShadow: `inset 0 0 0 0.5px ${highlight}`,
        }} />
      </div>
    </div>
  );
}

function PassportBand({ palette }) {

  const primary   = palette?.primary   || '#8E2D2D';  // oxblood

        {/* Stamp 4 — "ENTRY" rectangle (ink blue, faded variant) */}
        <g transform="translate(475 22) rotate(3)" opacity="0.7">

          <text x="0" y="-2" textAnchor="middle" fontFamily="Inter, sans-serif" fontSize="3.8" fontWeight="600" fill={cool} letterSpacing="0.5">ENTRY</text>
          <text x="0" y="4" textAnchor="middle" fontFamily="Inter, sans-serif" fontSize="2.8" fill={cool} letterSpacing="0.3">MAY · 2026</text>

}

const themeBands = {

// ---------------------------------------------------------------------------
// Spotify album art via oEmbed (no API key needed)
// ---------------------------------------------------------------------------

const oembedCache = new Map();
function SpotifyArt({ trackId, spotifyUrl, alt = '', linked = true }) {
  const [thumb, setThumb] = useState(() => oembedCache.get(trackId) || null);

  useEffect(() => {
    if (!trackId) {
      setThumb(null);
      return;
    }
    // Synchronously seed from cache, or clear stale state from previous trackId
    if (oembedCache.has(trackId)) {
      setThumb(oembedCache.get(trackId));
      return;
    }
    setThumb(null);  // Clear previous image while new one is fetching

    let cancelled = false;
    const url = `https://open.spotify.com/oembed?url=spotify:track:${trackId}`;
    fetch(url)
      .then(r => r.json())
      .then(d => {
        const t = d.thumbnail_url || null;
        oembedCache.set(trackId, t);
        if (!cancelled) setThumb(t);
      })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [trackId]);

  const inner = thumb
    ? <img src={thumb} alt={alt} loading="lazy" />
    : <div className="note-loader">♪</div>;

  if (linked && spotifyUrl) {
    return (
      <a href={spotifyUrl} target="_blank" rel="noopener noreferrer" className="spotify-link" aria-label={`Open ${alt} on Spotify`}>
        {inner}
      </a>
    );
  }
  return inner;
}

function Confetti({ palette }) {
  const colors = [palette.primary, palette.accent, palette.cool, palette.highlight];
  const pieces = useMemo(() => Array.from({ length: 16 }, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    delay: Math.random() * 0.4,
    color: colors[i % colors.length],
    duration: 1.4 + Math.random() * 0.6,
  })), [palette.primary]);

  return (
    <>
      {pieces.map(p => (
        <span
          key={p.id}
          className="confetti-piece"
          style={{
            left: `${p.left}%`,
            top: '0px',
            background: p.color,
            animationDelay: `${p.delay}s`,
            animationDuration: `${p.duration}s`,
          }}
        />
      ))}
    </>
  );
}

function ChartCanvas({ config, height = 240 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    if (chartRef.current) {
      chartRef.current.destroy();
      chartRef.current = null;
    }
    chartRef.current = new window.Chart(canvasRef.current, config);
    return () => {
      if (chartRef.current) {
        chartRef.current.destroy();
        chartRef.current = null;
      }
    };
  }, [config]);

  return (
    <div className="chart-wrap" style={{ height: `${height}px` }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

// Easter egg: shared audio context for the play button. Created lazily on first click
// (browsers block autoplay until user interaction). null if Web Audio is unavailable.
let _cassetteAudioCtx = null;
function getCassetteAudioCtx() {
  if (_cassetteAudioCtx) return _cassetteAudioCtx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    _cassetteAudioCtx = new Ctx();
    return _cassetteAudioCtx;
  } catch (_) { return null; }
}

// Plays a short ascending-then-descending sequence that says "this cassette is playing"
// without becoming a full song. Returns total duration in ms so the caller can stop visuals.
function playCassetteMelody() {
  const ctx = getCassetteAudioCtx();
  if (!ctx) return 3000;  // No audio? Still let visuals run for 3s
  // Resume in case browser auto-suspended it
  if (ctx.state === 'suspended') ctx.resume().catch(() => {});

  // C-major-pentatonic-ish phrase: C4, E4, G4, A4, G4, E4, C4
  const notes = [261.63, 329.63, 392.00, 440.00, 392.00, 329.63, 261.63];
  const noteDur = 0.32;       // seconds per note
  const fadeIn  = 0.02;
  const fadeOut = 0.08;
  const startAt = ctx.currentTime + 0.02;
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.13;  // very quiet
  masterGain.connect(ctx.destination);

  notes.forEach((freq, i) => {
    const t0 = startAt + i * noteDur;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(1, t0 + fadeIn);
    g.gain.setValueAtTime(1, t0 + noteDur - fadeOut);
    g.gain.linearRampToValueAtTime(0, t0 + noteDur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + noteDur + 0.05);
  });

  return Math.round(notes.length * noteDur * 1000) + 200;
}

function PlayMark({ palette }) {
  const primary = palette?.primary   || '#C9824B';
  const accent  = palette?.accent    || '#D9B68C';
  const high    = palette?.highlight || '#8B4513';
  const [playing, setPlaying] = useState(false);
  const [pressed, setPressed] = useState(false);
  const stopTimerRef = useRef(null);

  // Cleanup the auto-stop timer on unmount
  useEffect(() => {
    return () => {
      if (stopTimerRef.current) clearTimeout(stopTimerRef.current);
    };
  }, []);

  const handleClick = (e) => {
    e.stopPropagation();
    if (playing) {
      // Pausing
      setPlaying(false);
      if (stopTimerRef.current) {
        clearTimeout(stopTimerRef.current);
        stopTimerRef.current = null;
      }
      window.dispatchEvent(new CustomEvent('cassette-play-toggle', { detail: { playing: false } }));
      return;
    }
    // Starting playback
    setPlaying(true);
    setPressed(true);
    setTimeout(() => setPressed(false), 150);
    if (navigator.vibrate) {
      try { navigator.vibrate(30); } catch (_) {}
    }
    const duration = playCassetteMelody();
    window.dispatchEvent(new CustomEvent('cassette-play-toggle', { detail: { playing: true } }));
    stopTimerRef.current = setTimeout(() => {
      setPlaying(false);
      stopTimerRef.current = null;
      window.dispatchEvent(new CustomEvent('cassette-play-toggle', { detail: { playing: false } }));
    }, duration);
  };

  const transform = pressed ? 'scale(0.92)' : 'scale(1)';

  return (
    <button
      onClick={handleClick}
      aria-label={playing ? 'Pause cassette' : 'Play cassette'}
      style={{
        background: 'transparent',
        border: 'none',
        padding: 0,
        cursor: 'pointer',
        transform,
        transition: 'transform 0.12s ease',
        display: 'block',
        lineHeight: 0,
      }}
    >
      <svg viewBox="0 0 64 64" width="48" height="48">
        {/* Outer ring — round button silhouette */}
        <circle cx="32" cy="32" r="22" fill={high} stroke={primary} strokeWidth="2" />
        {/* Inner highlight ring (suggests pressable button) */}
        <circle cx="32" cy="32" r="19" fill="none" stroke={accent} strokeWidth="0.8" opacity="0.6" />
        {playing ? (
          /* Pause bars */
          <g fill={primary} stroke={accent} strokeWidth="0.6" strokeLinejoin="round">
            <rect x="25" y="22" width="5" height="20" rx="0.6" />
            <rect x="34" y="22" width="5" height="20" rx="0.6" />
          </g>
        ) : (
          /* Play triangle */
          <path d="M 27 22 L 27 42 L 44 32 Z" fill={primary} stroke={accent} strokeWidth="0.6" strokeLinejoin="round" />
        )}
      </svg>
    </button>
  );
}

function SongCard({ song, rank, voteDetails, isOpen, onToggle, onPlayerClick }) {
  // All votes & comments associated with this song. Sort point-bearing votes by points
  // descending; comment-only rows (0 points) trail at the bottom alphabetically by voter.
  const songVotes = (voteDetails || [])
    .filter(v => v.song === song.title && v.submitter === song.submitter)
    .sort((a, b) => {
      if ((b.points > 0) !== (a.points > 0)) return (b.points > 0) ? 1 : -1;
      if (b.points !== a.points) return b.points - a.points;
      return a.voter.localeCompare(b.voter);
    });

  return (
    <div className={`song-card${isOpen ? ' open' : ''}${song.forfeited ? ' forfeited' : ''}`}>
      <div className="song-card-head" onClick={onToggle}>
        <div className="song-rank">{rank}</div>
        <div className="song-art">
          <SpotifyArt trackId={song.track_id} spotifyUrl={song.spotify_url} alt={song.title} linked={false} />
        </div>
        <div className="song-meta">
          <div className="song-title">{trimTitle(song.title)}</div>
          <div className="song-sub">
            {song.artist} <span style={{ color: 'var(--dim)' }}>·</span>{' '}
            <span onClick={(e) => { e.stopPropagation(); onPlayerClick(song.submitter_id); }} style={{ cursor: 'pointer' }}>
              <span style={{ color: 'var(--mute)' }}>by </span>
              <span style={{ color: 'var(--text)' }}>{song.submitter}</span>
            </span>
          </div>
        </div>
        <div className="song-pts">
          <div className="song-pts-num">{song.total_pts}</div>
          <div className="song-pts-vot">{song.unique_voters}v</div>
        </div>
        <div className="song-chevron">›</div>
      </div>
      {isOpen ? (
        <div className="song-body">
          {song.comment ? (
            <div className="song-comment">
              <span className="song-comment-label">submitter note</span>
              {song.comment.trim()}
            </div>
          ) : null}
          {songVotes.length === 0 ? (
            <div className="vote-list-empty">Nobody voted for this one. Brave submission.</div>
          ) : (
            <div className="vote-list">
              {songVotes.map((v, i) => {
                const isZero = v.points === 0;
                const ptsClass = isZero ? 'zero' : v.points >= 4 ? 'high' : v.points >= 2 ? 'mid' : '';
                return (
                  <div className={`vote-row${isZero ? ' zero' : ''}`} key={i}>
                    <span className={`vote-pts ${ptsClass}`}>{isZero ? 'note' : v.points}</span>
                    <span className="vote-name" onClick={() => onPlayerClick(v.voter_id)}>{v.voter}</span>
                    {v.comment ? <span className="vote-comment">"{v.comment.trim()}"</span> : null}
                  </div>
                );
              })}
            </div>
          )}
          {song.forfeited ? (
            <div className="song-comment" style={{ borderBottom: 'none', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--surf)' }}>
              <span className="song-comment-label" style={{ color: 'var(--p)' }}>forfeit</span>
              <span style={{ fontStyle: 'normal', color: 'var(--mute)' }}>
                {song.submitter} did not vote this round. Per league rules, the {song.total_pts} {song.total_pts === 1 ? 'point' : 'points'} this song earned do not count toward their season total.
              </span>
            </div>
          ) : null}
        </div>
      ) : null}
    </div>
  );
}

  const [confettiKey, setConfettiKey] = useState(0);

  useEffect(() => { setConfettiKey(k => k + 1); }, [roundIdx]);

  if (!round) {
    return <div className="page"><div className="empty">No rounds played yet — somebody's gotta press play.</div></div>;
  }

  const winner = round.songs[0];
  const others = round.songs.slice(1);

  const toggleSong = (uri) => {
    setExpandedSongs(prev => {
      const next = new Set(prev);
      if (next.has(uri)) next.delete(uri);
      else next.add(uri);
      return next;
    });
  };
  const expandAll  = () => setExpandedSongs(new Set(round.songs.map(s => s.spotify_uri)));

    <>

              <div className="winner-rank">#1</div>

                {winner.artist}<span className="dot">·</span>

      let cum = 0;
      const data = rounds.map(r => {
        const w = (p.weekly || []).find(x => x.round === r.number);
        cum += (w?.points || 0);
        return cum;
      });
      return {
        label: p.player,
        data,
        borderColor: colors[i % colors.length],
        backgroundColor: colors[i % colors.length] + '20',
        tension: 0.3,
        borderWidth: 2,
        pointRadius: 3,
      };
    });
    return {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#fafafa', font: { size: 11 } } },
        },
        scales: {
          x: { ticks: { color: '#888' }, grid: { color: '#222' } },
          y: { ticks: { color: '#888' }, grid: { color: '#222' }, beginAtZero: true },
        },
      },
    };
  }, [rounds, standings]);

  return (
    <div className="page">
      <div className="section-h">
        <div className="section-h-title">Season standings</div>
        <div className="section-h-meta">{rounds.length} round{rounds.length !== 1 ? 's' : ''} played</div>
      </div>

      <div className="lb" style={{ marginBottom: '24px' }}>
        {standings.map((e) => (
          <div className={`lb-row${e.rank === 1 ? ' first' : ''}`} key={e.player_id}>
            <div className="lb-rank">{e.rank}</div>
            <div className="lb-name" onClick={() => onPlayerClick(e.player_id)}>{e.player}</div>
            <div className="lb-forfeit">{e.rounds_played} rd · {Number(e.avg_per_round).toFixed(1)} avg{e.wins ? ` · ${e.wins} win${e.wins !== 1 ? 's' : ''}` : ''}</div>
            <div className="lb-pts">{e.points}</div>
          </div>
        ))}
      </div>

      {rounds.length >= 2 && trendConfig ? (
        <>
          <div className="section-h">
            <div className="section-h-title">Cumulative trend (top 8)</div>
          </div>
          <ChartCanvas config={trendConfig} />
        </>
      ) : (
        <div className="empty" style={{ padding: '20px 0' }}>
          More rounds = more chart. Check back next week.
        </div>
      )}

      {data.voting_affinities && data.voting_affinities.length > 0 ? (
        <>
          <div className="section-h" style={{ marginTop: '28px' }}>
            <div className="section-h-title">Voting affinities</div>
            <div className="section-h-meta">who gives points to whom</div>
          </div>
          <div className="flat-list">
            {data.voting_affinities.slice(0, 10).map((a, i) => (
              <div className="flat-list-row" key={i}>
                <div className="flat-list-name">{a.voter} → {a.submitter}</div>
                <div className="flat-list-val">{a.times} time{a.times !== 1 ? 's' : ''}</div>
                <div className="flat-list-pts">{a.total_pts}p</div>
              </div>
            ))}
          </div>
        </>
      ) : null}

      <FunMetrics metrics={data.fun_metrics || {}} />
    </div>
  );
}

// ---------------------------------------------------------------------------
// Songs page
// ---------------------------------------------------------------------------

function SongsPage({ data, onPlayerClick }) {
  const hof = data.hall_of_fame || [];
  const rounds = data.rounds || [];

  const allSongs = useMemo(() => {
    const all = [];
    rounds.forEach(rd => {
      rd.songs.forEach((s, i) => all.push({ ...s, round: rd.number, rank_in_round: i + 1 }));
    });
    all.sort((a, b) => b.total_pts - a.total_pts || b.unique_voters - a.unique_voters);
    return all;
  }, [rounds]);

  const hofChartConfig = useMemo(() => {
    if (hof.length === 0) return null;
    const top = hof.slice(0, 20);
    return {
      type: 'bar',
      data: {
        labels: top.map(s => trimTitle(s.title).substring(0, 22)),
        datasets: [{
          data: top.map(s => s.total_pts),
          backgroundColor: '#F08A47',
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#888' }, grid: { color: '#222' } },
          y: { ticks: { color: '#fafafa', font: { size: 11 } }, grid: { color: '#222' } },
        },
      },
    };
  }, [hof]);

  return (
    <div className="page">
      <div className="section-h">
        <div className="section-h-title">Hall of fame</div>
        <div className="section-h-meta">top songs of the season</div>
      </div>
      {hofChartConfig ? <ChartCanvas config={hofChartConfig} height={500} /> : (
        <div className="empty">No songs yet.</div>
      )}

      <div className="section-h" style={{ marginTop: '24px' }}>
        <div className="section-h-title">All songs</div>
        <div className="section-h-meta">{allSongs.length} total</div>
      </div>
      <div className="song-list">
        {allSongs.map((s, i) => (
          <div className="song-card" key={`${s.round}-${s.spotify_uri}`}>
            <div className="song-card-head" style={{ cursor: 'default' }}>
              <div className="song-rank">{i + 1}</div>
              <div className="song-art">
                <SpotifyArt trackId={s.track_id} spotifyUrl={s.spotify_url} alt={s.title} linked={false} />
              </div>
              <div className="song-meta">
                <div className="song-title">{trimTitle(s.title)}</div>
                <div className="song-sub">
                  {s.artist} <span style={{ color: 'var(--dim)' }}>·</span>{' '}
                  <span onClick={() => onPlayerClick(s.submitter_id)} style={{ cursor: 'pointer' }}>
                    <span style={{ color: 'var(--mute)' }}>by </span>
                    <span style={{ color: 'var(--text)' }}>{s.submitter}</span>
                  </span>{' '}
                  <span style={{ color: 'var(--dim)' }}>· R{s.round}</span>
                </div>
              </div>
              <div className="song-pts">
                <div className="song-pts-num">{s.total_pts}</div>
                <div className="song-pts-vot">{s.unique_voters}v</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Players page
// ---------------------------------------------------------------------------

function PlayersPage({ data, onPlayerClick }) {
  const standings = data.season_leaderboard || [];
  const sorted = [...standings].sort((a, b) => a.player.localeCompare(b.player));
  return (
    <div className="page">
      <div className="section-h">
        <div className="section-h-title">Players</div>
        <div className="section-h-meta">{sorted.length} active</div>
      </div>
      <div className="player-grid">
        {sorted.map(p => (
          <div className="player-cell" key={p.player_id} onClick={() => onPlayerClick(p.player_id)}>
            <div className="player-cell-name">{p.player}</div>
            <div className="player-cell-stat">{p.points} pts · {p.rounds_played} rd · {Number(p.avg_per_round).toFixed(1)} avg</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Profile page
// ---------------------------------------------------------------------------

function ProfilePage({ data, profileId, onPlayerClick, onBack }) {
  const profile = (data.player_profiles || {})[profileId];
  const seasonEntry = (data.season_leaderboard || []).find(e => e.player_id === profileId);

  // Trend chart for this player — single y-axis: cumulative growth + per-week swings
  const trendConfig = useMemo(() => {
    if (!profile || !seasonEntry || !seasonEntry.weekly || seasonEntry.weekly.length < 1) return null;
    const labels = seasonEntry.weekly.map(w => `R${w.round}`);
    let cum = 0;
    const cumData = seasonEntry.weekly.map(w => { cum += w.points; return cum; });
    const weeklyData = seasonEntry.weekly.map(w => w.points);
    const cumColor = '#F08A47';   // warm — for cumulative growth
    const wkColor  = '#5B7B8C';   // denim slate — for per-week swings (cool counterweight)
    return {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Cumulative',
            data: cumData,
            borderColor: cumColor,
            backgroundColor: cumColor + '22',
            tension: 0.3,
            borderWidth: 2.5,
            fill: true,
            pointRadius: 4,
            order: 2,
          },
          {
            label: 'This week',
            data: weeklyData,
            borderColor: wkColor,
            backgroundColor: 'transparent',
            tension: 0.25,
            borderWidth: 2,
            borderDash: [5, 4],
            fill: false,
            pointRadius: 3,
            pointBackgroundColor: wkColor,
            order: 1,
          },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: { color: '#888', font: { size: 11 }, boxWidth: 12, boxHeight: 8, padding: 12 },
          },
        },
        scales: {
          x: { ticks: { color: '#888' }, grid: { color: '#222' } },
          y: {
            type: 'linear', position: 'left',
            ticks: { color: '#888', font: { size: 10 } },
            grid: { color: '#222' },
            beginAtZero: true,
          },
        },
      },
    };
  }, [profile, seasonEntry]);

  if (!profile) {
    return (
      <div className="page">
        <button className="expand-toggle" onClick={onBack}>← Back</button>
        <div className="empty">Player not found.</div>
      </div>
    );
  }

  // Best song
  const bestSong = (profile.submissions || []).reduce(
    (best, s) => (!best || s.total_pts > best.total_pts ? s : best),
    null
  );

  // Voting patterns: gives most points to / biggest fans
  const givesTo = {};
  (profile.voting_history || []).forEach(v => {
    givesTo[v.voted_for] = (givesTo[v.voted_for] || 0) + v.points_given;
  });
  const givesToTop = Object.entries(givesTo).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // Biggest fans (who gives points to this player)
  const fans = {};
  (data.rounds || []).forEach(rd => {
    rd.vote_details.forEach(v => {
      if (v.submitter_id === profileId) {
        fans[v.voter] = (fans[v.voter] || 0) + v.points;
      }
    });
  });
  const fansTop = Object.entries(fans).sort((a, b) => b[1] - a[1]).slice(0, 5);

  return (
    <div className="page">
      <button className="expand-toggle" onClick={onBack}>← Back</button>
      <div className="profile-head" style={{ marginTop: '14px' }}>
        <div className="profile-avatar">{initials(profile.name)}</div>
        <div>
          <div className="profile-name">{profile.name}</div>
          <div style={{ color: 'var(--mute)', fontSize: '13px', marginTop: '2px' }}>
            {seasonEntry ? `Rank #${seasonEntry.rank} · ${seasonEntry.points} pts · ${seasonEntry.rounds_played} round${seasonEntry.rounds_played !== 1 ? 's' : ''}` : 'No data yet'}
          </div>
        </div>
      </div>

      <div className="profile-stats">
        <div className="stat-box">
          <div className="stat-label">Season points</div>
          <div className="stat-num">{profile.season_points}</div>
        </div>
        <div className="stat-box">
          <div className="stat-label">Avg per round</div>
          <div className="stat-num">{Number(seasonEntry?.avg_per_round || 0).toFixed(1)}</div>
        </div>
        <div className="stat-box cool">
          <div className="stat-label">Wins</div>
          <div className="stat-num cool">{seasonEntry?.wins || 0}</div>
        </div>
      </div>

      {trendConfig ? (
        <>
          <div className="section-h">
            <div className="section-h-title">Trend</div>
            <div className="section-h-meta">cumulative + per week</div>
          </div>
          <ChartCanvas config={trendConfig} height={280} />
        </>
      ) : null}

      {bestSong ? (
        <>
          <div className="section-h" style={{ marginTop: '20px' }}>
            <div className="section-h-title">Best submission</div>
          </div>
          <div className="winner-card">
            <div className="winner-art">
              <SpotifyArt trackId={bestSong.track_id} spotifyUrl={bestSong.spotify_url} alt={bestSong.title} />
            </div>
            <div className="winner-info">
              <div className="winner-rank">R{bestSong.round}</div>
              <div className="winner-title">{trimTitle(bestSong.title)}</div>
              <div className="winner-meta">{bestSong.artist}</div>
            </div>
            <div className="winner-pts">
              <div className="winner-pts-num">{bestSong.total_pts}</div>
              <div className="winner-pts-label">points</div>
            </div>
          </div>
        </>
      ) : null}

      <div className="section-h" style={{ marginTop: '20px' }}>
        <div className="section-h-title">All submissions</div>
      </div>
      <div className="song-list">
        {profile.submissions.map((s, i) => (
          <div className="song-card" key={i}>
            <div className="song-card-head" style={{ cursor: 'default' }}>
              <div className="song-rank">R{s.round}</div>
              <div className="song-art">
                <SpotifyArt trackId={s.track_id} spotifyUrl={s.spotify_url} alt={s.title} linked={false} />
              </div>
              <div className="song-meta">
                <div className="song-title">{trimTitle(s.title)}</div>
                <div className="song-sub">{s.artist}</div>
              </div>
              <div className="song-pts">
                <div className="song-pts-num">{s.total_pts}</div>
                <div className="song-pts-vot">{s.unique_voters}v</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {givesToTop.length > 0 ? (
        <>
          <div className="section-h" style={{ marginTop: '20px' }}>
            <div className="section-h-title">Gives most points to</div>
          </div>
          <div className="flat-list">
            {givesToTop.map(([name, pts], i) => (
              <div className="flat-list-row" key={i}>
                <div className="flat-list-name">{name}</div>
                <div className="flat-list-pts">{pts}p</div>
              </div>
            ))}
          </div>
        </>
      ) : null}

      {fansTop.length > 0 ? (
        <>
          <div className="section-h" style={{ marginTop: '20px' }}>
            <div className="section-h-title">Biggest fans</div>
          </div>
          <div className="flat-list">
            {fansTop.map(([name, pts], i) => (
              <div className="flat-list-row" key={i}>
                <div className="flat-list-name">{name}</div>
                <div className="flat-list-pts">{pts}p</div>
              </div>
            ))}
          </div>
        </>
      ) : null}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Recap page (commentary on its own page with round nav)
// ---------------------------------------------------------------------------

function RecapPage({ data, roundIdx, setRoundIdx }) {
  const rounds = data.rounds || [];
  const round = rounds[roundIdx];
  const commentary = round?.commentary;

  if (!round) {
    return <div className="page"><div className="empty">No recaps yet — gotta play some rounds first.</div></div>;
  }

  return (
    <>
      <RoundBar
        round={round}
        totalRounds={rounds.length}
        idx={roundIdx}
        onPrev={() => setRoundIdx(Math.max(0, roundIdx - 1))}
        onNext={() => setRoundIdx(Math.min(rounds.length - 1, roundIdx + 1))}
      />
      <div className="page">
        <div className="recap">
          {commentary ? (
            <>
              <h2 style={{ fontSize: '22px', fontWeight: 500, marginTop: 0, marginBottom: '20px', letterSpacing: '-0.01em' }}>
                {commentary.title}
              </h2>
              {(commentary.sections || []).map((s, i) => (
                <div className="recap-section" key={i}>
                  <div className="recap-h">{s.heading}</div>
                  <p className="recap-p">{s.text}</p>
                </div>
              ))}
            </>
          ) : (
            <div className="empty">Recap coming soon.</div>
          )}
        </div>
      </div>
    </>
  );
}

// ---------------------------------------------------------------------------
// Fun metrics block
// ---------------------------------------------------------------------------

function FunMetrics({ metrics }) {
  const cards = [];
  const m = metrics || {};

  if (m.kingmaker?.leader?.player) {
    cards.push({ k: 'kingmaker', t: m.kingmaker.title, d: m.kingmaker.description,
      lead: `${m.kingmaker.leader.player} · ${m.kingmaker.leader.value}`, det: m.kingmaker.leader.detail });
  }
  if (m.hipster?.leader?.player) {
    cards.push({ k: 'hipster', t: m.hipster.title, d: m.hipster.description,
      lead: `${m.hipster.leader.player} · ${m.hipster.leader.value}`, det: m.hipster.leader.detail });
  }
  if (m.sheep?.leader?.player) {
    cards.push({ k: 'sheep', t: m.sheep.title, d: m.sheep.description,
      lead: `${m.sheep.leader.player} · ${m.sheep.leader.value}`, det: m.sheep.leader.detail });
  }
  if (m.cold_shoulder?.players?.length > 0) {
    cards.push({ k: 'cold', t: m.cold_shoulder.title, d: m.cold_shoulder.description,
      list: m.cold_shoulder.players });
  }
  if (m.snub?.songs?.length > 0) {
    cards.push({ k: 'snub', t: m.snub.title, d: m.snub.description,
      list: m.snub.songs.map(s => ({
        player: `${trimTitle(s.song)}`,
        value: `R${s.round} · ${s.voters}v · ${s.pts}p (avg ${s.avg})`,
      })) });
  }
  if (m.taste_twins?.pairs?.length > 0) {
    cards.push({ k: 'twins', t: m.taste_twins.title, d: m.taste_twins.description,
      list: m.taste_twins.pairs.map(p => ({
        player: `${p.player1} & ${p.player2}`,
        value: p.overlap,
      })) });
  }
  if (m.efficiency?.leaders?.length > 0) {
    cards.push({ k: 'eff', t: m.efficiency.title, d: m.efficiency.description,
      list: m.efficiency.leaders });
  }
  if (m.ghost_report?.ghosts?.length > 0) {
    cards.push({ k: 'ghost', t: m.ghost_report.title, d: m.ghost_report.description,
      lead: m.ghost_report.ghosts.join(', '), det: 'Show up, friends.', full: true });
  }

  if (cards.length === 0) return null;

  // If we have an odd number of cards and the last one isn't already full-width,
  // promote it so it doesn't dangle alone in a 2-col row
  if (cards.length % 2 === 1 && !cards[cards.length - 1].full) {
    cards[cards.length - 1] = { ...cards[cards.length - 1], full: true };
  }

  return (
    <>
      <div className="section-h" style={{ marginTop: '28px' }}>
        <div className="section-h-title">Fun metrics</div>
      </div>
      <div className="fm-grid">
        {cards.map(c => (
          <div className={`fm-card${c.full ? ' full' : ''}`} key={c.k}>
            <div className="fm-title">{c.t}</div>
            <div className="fm-desc">{c.d}</div>
            {c.lead ? <div className="fm-leader">{c.lead}</div> : null}
            {c.det ? <div className="fm-detail">{c.det}</div> : null}
            {c.list ? (
              <div className="fm-list">
                {c.list.slice(0, 5).map((it, i) => (
                  <div className="fm-list-row" key={i}>
                    <span className="fm-list-name">{it.player}</span>
                    <span className="fm-list-val">{it.value}</span>
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        ))}
      </div>
    </>
  );
}

// ---------------------------------------------------------------------------
// App
// ---------------------------------------------------------------------------

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [page, setPage] = useState('weekly');
  const [roundIdx, setRoundIdx] = useState(0);
  const [profileId, setProfileId] = useState(null);

  // Load data — bump ?v=N each weekly deploy
  useEffect(() => {
    fetch('data.json?v=3')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(setData)
      .catch(e => setError(e.message));
  }, []);

  // Default round to most recent on load
  useEffect(() => {
    if (data?.rounds?.length) {
      setRoundIdx(data.rounds.length - 1);
    }
  }, [data]);

  // Apply theme based on the round currently in focus.
  // Round-anchored tabs (weekly/recap) follow roundIdx directly.
  // Non-round tabs (season/songs/players/profile) inherit the same roundIdx
  // so the visual identity stays consistent as you navigate around.
  useEffect(() => {
    if (!data?.rounds?.length) return;
    const round = data.rounds[roundIdx] || data.rounds[data.rounds.length - 1];
    if (round?.theme) applyTheme(round.theme);
  }, [data, roundIdx, page]);

  if (error) {
    return (
      <div style={{ padding: '40px', textAlign: 'center' }}>
        <div style={{ color: '#F08A47', fontSize: '18px', marginBottom: '8px' }}>Couldn't load data.json</div>
        <div style={{ color: '#888', fontSize: '13px' }}>{error}</div>
      </div>
    );
  }
  if (!data) {
    return (
      <div style={{ padding: '40px', textAlign: 'center' }}>
        <div className="note-loader" style={{ width: 'auto', fontSize: '24px' }}>♪ ♫ ♪</div>
      </div>
    );
  }

  const handlePlayerClick = (pid) => {
    setProfileId(pid);
    setPage('profile');
  };
  const handleProfileBack = () => {
    setProfileId(null);
    setPage('players');
  };

  // Resolve current theme: follow roundIdx on every tab so design identity persists across nav
  const currentTheme = (() => {
    if (!data?.rounds?.length) return null;
    const rd = data.rounds[roundIdx] || data.rounds[data.rounds.length - 1];
    return rd?.theme || null;
  })();

  return (
    <>
      <Header league={data.league} />
      <ThemeBand theme={currentTheme} />
      <Nav page={page} setPage={setPage} />
      {page === 'weekly'  ? <WeeklyPage  data={data} roundIdx={roundIdx} setRoundIdx={setRoundIdx} onPlayerClick={handlePlayerClick} /> : null}
      {page === 'season'  ? <SeasonPage  data={data} onPlayerClick={handlePlayerClick} /> : null}
      {page === 'songs'   ? <SongsPage   data={data} onPlayerClick={handlePlayerClick} /> : null}
      {page === 'players' ? <PlayersPage data={data} onPlayerClick={handlePlayerClick} /> : null}
      {page === 'recap'   ? <RecapPage   data={data} roundIdx={roundIdx} setRoundIdx={setRoundIdx} /> : null}
      {page === 'profile' ? <ProfilePage data={data} profileId={profileId} onPlayerClick={handlePlayerClick} onBack={handleProfileBack} /> : null}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
